name: Tests
on:
  push:
    branches:
      - main
      - '*.x'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'
jobs:
  tests:
    name: ${{ matrix.name || matrix.python }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {python: '3.14'}
          - {python: '3.13'}
          - {python: '3.12'}
          - {python: '3.11'}
          - {python: '3.10'}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
          cache: pip
      - run: pip install tox
      - run: tox run -e ${{ matrix.tox || format('py{0}', matrix.python) }}

  downstream-tests:
    name: py${{ matrix.python }} ${{ matrix.downstream }} downstream
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
        downstream:
          - pallets-eco/flask-wtf
          - pallets-eco/wtforms-sqlalchemy
    steps:
      - name: Checkout wtforms
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          path: wtforms
      - name: Checkout ${{ matrix.downstream }}
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          repository: ${{ matrix.downstream }}
          path: ${{ matrix.downstream }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.downstream }}/pyproject.toml
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install downstream test environment
        working-directory: ${{ matrix.downstream }}
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install -e . --all-groups --all-extras
          uv pip install --force-reinstall ../wtforms
      - name: Run downstream tests
        working-directory: ${{ matrix.downstream }}
        run: uv run --no-sync pytest
      - name: Emit warning on failure
        if: failure()
        run: echo "::warning::${{ matrix.downstream }} tests failed on Python ${{ matrix.python }}"
